name: "Build & Release"

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-android:
    name: Build Android (arm64)
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3.12.0
        with:
          distribution: 'oracle'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.4'
          channel: 'stable'
          cache: true                      # caches Flutter SDK itself

      # Pub cache — keyed on pubspec.lock so it only invalidates on dep changes
      - name: Cache Pub dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: pub-${{ hashFiles('pubspec.lock') }}
          restore-keys: pub-

      # Gradle cache — biggest win, saves ~2-3 min on cold builds
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/gradle/wrapper/gradle-wrapper.properties', 'android/app/build.gradle.kts') }}
          restore-keys: gradle-

      # Rust/Cargo cache — keyed on Cargo.lock, saves Rust compile time
      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "rust"

      - name: Install Dependencies
        run: flutter pub get

      - name: Extract version from pubspec.yaml
        run: |
          VERSION=$(grep -E '^version:' pubspec.yaml | awk '{print $2}' | cut -d'+' -f1)
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Create keystore file
        run: base64 -d android/dev.keystore.b64 > android/bloomee.jks

      - name: Create keystore properties
        run: |
          echo keyPassword=devpass123 > android/key.properties
          echo storePassword=devpass123 >> android/key.properties
          echo keyAlias=dev >> android/key.properties

      - name: Build APK (arm64-v8a)
        run: flutter build apk --release --target-platform android-arm64 --build-number ${{ github.run_number }}

      - name: Rename APK
        run: |
          mv build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/bloomee_v${{ env.VERSION }}+${{ github.run_number }}_arm64.apk

      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: build/app/outputs/flutter-apk/bloomee_v${{ env.VERSION }}+${{ github.run_number }}_arm64.apk
          tag: v${{ env.VERSION }}+${{ github.run_number }}
          token: ${{ secrets.GITHUB_TOKEN }}
          prerelease: true
          allowUpdates: true
