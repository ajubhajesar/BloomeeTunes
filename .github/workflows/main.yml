name: "Build & Release"

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-android:
    name: Build Android (arm64)
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3.12.0
        with:
          distribution: 'oracle'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.4'
          channel: 'stable'
          cache: true

      # Pub cache — keyed on pubspec.lock
      - name: Cache Pub dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: pub-${{ hashFiles('pubspec.lock') }}
          restore-keys: pub-

      # Gradle cache — task cache + wrapper
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/gradle/wrapper/gradle-wrapper.properties', 'android/app/build.gradle.kts') }}
          restore-keys: gradle-

      # NDK cache — avoids 14s re-download every run
      - name: Cache Android NDK
        uses: actions/cache@v4
        with:
          path: /usr/local/lib/android/sdk/ndk
          key: ndk-27.0.12077973
      
      # Android SDK platform cache — avoids platform 31+33 re-download
      - name: Cache Android SDK Platforms
        uses: actions/cache@v4
        with:
          path: /usr/local/lib/android/sdk/platforms
          key: sdk-platforms-31-33

      # Cargo registry cache (crate downloads)
      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-registry-${{ hashFiles('rust_builder/Cargo.lock') }}
          restore-keys: cargo-registry-

      # Cargokit compiled .so cache — keyed on Rust sources + Cargo.lock
      # CARGOKIT_TARGET_TEMP_DIR is set to a stable path so it survives runs
      - name: Cache Cargokit build output
        uses: actions/cache@v4
        with:
          path: ~/.cargokit-target
          key: cargokit-aarch64-${{ hashFiles('rust_builder/Cargo.lock', 'rust_builder/src/**') }}
          restore-keys: cargokit-aarch64-


      - name: Download FontAwesome fonts
        run: |
          mkdir -p assets/fonts/fontawesome-free-6.4.0-desktop/otfs
          curl -L "https://github.com/FortAwesome/Font-Awesome/releases/download/6.4.0/fontawesome-free-6.4.0-desktop.zip" -o /tmp/fa.zip
          unzip -o -j /tmp/fa.zip "fontawesome-free-6.4.0-desktop/otfs/*.otf" -d assets/fonts/fontawesome-free-6.4.0-desktop/otfs/

      - name: Install Dependencies
        run: flutter pub get

      - name: Extract version from pubspec.yaml
        run: |
          VERSION=$(grep -E '^version:' pubspec.yaml | awk '{print $2}' | cut -d'+' -f1)
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Create keystore file
        run: base64 -d android/dev.keystore.b64 > android/bloomee.jks

      - name: Create keystore properties
        run: |
          echo keyPassword=devpass123 > android/key.properties
          echo storePassword=devpass123 >> android/key.properties
          echo keyAlias=dev >> android/key.properties

      - name: Build APK (arm64-v8a)
        env:
          # Redirect cargokit's Rust build output to the cached stable path
          CARGOKIT_TARGET_TEMP_DIR: /home/runner/.cargokit-target
        run: flutter build apk --release --target-platform android-arm64 --build-number ${{ github.run_number }}

      - name: Rename APK
        run: |
          mv build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/bloomee_v${{ env.VERSION }}+${{ github.run_number }}_arm64.apk

      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: build/app/outputs/flutter-apk/bloomee_v${{ env.VERSION }}+${{ github.run_number }}_arm64.apk
          tag: v${{ env.VERSION }}+${{ github.run_number }}
          token: ${{ secrets.GITHUB_TOKEN }}
          prerelease: true
          allowUpdates: true
